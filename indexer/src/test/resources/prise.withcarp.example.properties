# Example "carp JDBC" test configuration, committed and secret-free.
# Used by ConfigTest to exercise the carpJDBC validation path.
# Copy to prise.withcarp.properties to run those tests locally with real values
# (prise.withcarp.properties is gitignored).

run.mode=livesync
log.env=dev
latest.prices.livesync.update.interval.seconds=15

start.metrics.server=true
metrics.server.port=9108

app.datasource.driver-class-name=org.postgresql.Driver
app.datasource.url=jdbc:postgresql://localhost:5432/prise
app.datasource.username=prise
app.datasource.password=prise

token.metadata.service.module=tokenRegistry

chain.database.service.module=carpJDBC

### OPTION CARP-JDBC
carp.datasource.driver-class-name=org.postgresql.Driver
carp.datasource.url=jdbc:postgresql://localhost:5432/carp_mainnet?currentSchema=public
carp.datasource.username=carp
carp.datasource.password=

### OPTION KOIOS (WIP)
koios.datasource.url=https://api.koios.rest/api/v1
koios.datasource.apikey=

### OPTION BLOCKFROST
blockfrost.datasource.url=https://cardano-mainnet.blockfrost.io/api/v0
blockfrost.datasource.apikey=<YOUR_BLOCKFROST_PROJECT_ID>

### OPTION Yaci Store
yacistore.datasource.url=<YOUR_YACISTORE_URL>
yacistore.datasource.apikey=<YOUR_YACISTORE_TOKEN>

cnode.address=backbone.cardano.iog.io
cnode.port=3001

dex.classifiers=Minswap,Sundaeswap,Wingriders,MinswapV2

event.publishing.enabled=false
messaging.type=redis
messaging.host=localhost
messaging.port=6379
messaging.channel=prise-events

start.point.time=
