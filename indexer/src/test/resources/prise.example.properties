# Example test configuration for the Prise indexer.
#
# This file IS committed (whitelisted in .gitignore) and contains NO secrets.
# To run the integration tests (`./gradlew integrationTest`):
#   1. cp prise.example.properties prise.properties   (in this directory)
#   2. fill in the datasource URLs / API keys below for the provider you want
#      to test (the active one is `chain.database.service.module`).
# `prise.properties` is gitignored, so your real keys stay out of git.
#
# Any value here can also be supplied via environment variable instead of
# editing the file (env wins over the property): e.g. KOIOS_DATASOURCE_APIKEY,
# BLOCKFROST_DATASOURCE_APIKEY, YACISTORE_DATASOURCE_URL, etc.

run.mode=livesync
log.env=dev
latest.prices.livesync.update.interval.seconds=15

start.metrics.server=true
metrics.server.port=9108

# Application datasource (Postgres). Only needed for tests that touch the DB;
# the external-API integration tests (Koios/Blockfrost/YaciStore/TokenRegistry)
# do NOT require a running database.
app.datasource.driver-class-name=org.postgresql.Driver
app.datasource.url=jdbc:postgresql://localhost:5432/prise
app.datasource.username=prise
app.datasource.password=prise

# tokenRegistry uses the public https://tokens.cardano.org (no key required).
token.metadata.service.module=tokenRegistry

# Active chain database service module. One of:
#   carpJDBC | carpHTTP | koios | blockfrost | yacistore
# The integration test for the chosen module needs its datasource block below.
chain.database.service.module=blockfrost

### OPTION CARP-JDBC (needs a local carp Postgres DB)
#carp.datasource.driver-class-name=org.postgresql.Driver
#carp.datasource.url=jdbc:postgresql://localhost:5432/carp_mainnet?currentSchema=public
#carp.datasource.username=carp
#carp.datasource.password=

### OPTION KOIOS — note: KoiosService also delegates to Blockfrost,
### so a valid blockfrost.datasource.apikey is required too.
koios.datasource.url=https://api.koios.rest/api/v1
koios.datasource.apikey=

### OPTION BLOCKFROST — get a free project id at https://blockfrost.io
blockfrost.datasource.url=https://cardano-mainnet.blockfrost.io/api/v0
blockfrost.datasource.apikey=<YOUR_BLOCKFROST_PROJECT_ID>

### OPTION YACI STORE — your own yaci-store deployment + token
yacistore.datasource.url=<YOUR_YACISTORE_URL>
yacistore.datasource.apikey=<YOUR_YACISTORE_TOKEN>

# Cardano node (used by chain-sync). A public relay; prefer a self-hosted node.
cnode.address=backbone.cardano.iog.io
cnode.port=3001

dex.classifiers=Minswap,Sundaeswap,Wingriders,MinswapV2

event.publishing.enabled=false
messaging.type=redis
messaging.host=localhost
messaging.port=6379
messaging.channel=prise-events

start.point.time=
